defaultTasks 'run'

apply plugin: 'java'

version '1.0'
group 'org.jacamo.goldminers.expanded'

repositories {
    mavenCentral()
    maven { url "https://raw.githubusercontent.com/jacamo-lang/mvn-repo/master" }
    maven { url "https://repo.gradle.org/gradle/libs-releases" }
}

dependencies {
    implementation('org.jacamo:jacamo:1.3.0')
}

sourceSets {
    main {
        java {
            srcDir 'src/env'
            srcDir 'src/agt'
        }
        resources {
            srcDir 'src/resources'
        }
    }
}

task run(type: JavaExec, dependsOn: 'classes') {
    description 'runs the expanded Gold Miners JaCaMo application'
    group 'JaCaMo'
    doFirst {
        mkdir 'log'
    }
    mainClass = 'jacamo.infra.JaCaMoLauncher'
    args 'gold_miners_expanded.jcm'
    classpath sourceSets.main.runtimeClasspath
}

task buildJCMDeps(type: JavaExec, dependsOn: 'classes') {
    mainClass = 'jacamo.infra.RunJaCaMoProject'
    args = ['gold_miners_expanded.jcm', '--deps']
    classpath sourceSets.main.runtimeClasspath
}

clean {
    delete 'bin'
    delete 'build'
}
